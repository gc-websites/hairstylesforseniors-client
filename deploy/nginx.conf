# Sample nginx server block for the HairStylesForSeniors prerendered SPA.
# Point `root` at the built dist/ folder and reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name hairstylesforseniors.com www.hairstylesforseniors.com;

    # In production terminate TLS here (or in front via a load balancer).
    # listen 443 ssl http2;  ssl_certificate ...; ssl_certificate_key ...;

    root /var/www/hairstylesforseniors/dist;
    index index.html;

    # Gzip (or enable brotli if available)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable -> cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache HTML so updated prerenders/SPA shell are picked up immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Core routing:
    #   1) exact file (asset, robots.txt, sitemap.xml, ads.txt)
    #   2) prerendered pretty URL: /about -> /about/index.html
    #   3) SPA fallback to the shell (client renders, incl. the noindex 404 view)
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Optional: a real 404 document. Note that the SPA fallback above returns
    # 200 for unknown in-app routes by design; the in-app 404 view is noindex.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
